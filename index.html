<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>星雲娛樂城</title>
    <style>
        :root {
            --gold: #fccd4d;
            --gold-gradient: linear-gradient(135deg, #fceabb 0%, #fccd4d 50%, #f8b500 100%);
            --bg-color: #050505;
            --card-bg: #151515;
            --text-gray: #999;
            --safe-top: env(safe-area-inset-top);
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: white;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- 頂部導航 --- */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: calc(var(--safe-top) + 10px) 20px 10px;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .menu-btn { font-size: 24px; color: var(--gold); cursor: pointer; width: 60px; }
        .logo { font-size: 18px; font-weight: bold; color: var(--gold); letter-spacing: 2px; text-align: center; flex-grow: 1; }
        .login-btn { background: var(--gold-gradient); color: #000; border: none; padding: 6px 16px; border-radius: 20px; font-weight: bold; font-size: 13px; cursor: pointer; }

        /* --- 高質感側滑選單 --- */
        .sidebar {
            position: fixed;
            top: 0;
            left: -80%;
            width: 75%;
            max-width: 300px;
            height: 100%;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            border-right: 1px solid rgba(252, 205, 77, 0.2);
            transform: translateX(0); /* 使用 transform 優化動畫效能 */
        }

        .sidebar.open { transform: translateX(106.6%); /* 對應 left -80% 的位移 */ }

        .sidebar-header {
            padding: calc(var(--safe-top) + 40px) 20px 20px;
            background: linear-gradient(to right, rgba(252, 205, 77, 0.15), transparent);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .sidebar-header h2 { margin: 0; font-size: 18px; color: var(--gold); letter-spacing: 2px; }
        .sidebar-header p { font-size: 12px; color: #888; margin: 5px 0 0; }

        .sidebar-menu { list-style: none; padding: 0; margin: 0; }
        .sidebar-menu li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            color: #efefef;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .sidebar-menu li:active { background: rgba(252, 205, 77, 0.1); color: var(--gold); }
        .sidebar-menu li .arrow { color: rgba(252, 205, 77, 0.4); font-size: 12px; }

        /* 遮罩層 */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            opacity: 0;
            visibility: hidden;
            z-index: 150;
            transition: opacity 0.3s;
        }
        .overlay.active { opacity: 1; visibility: visible; }

        /* --- 遊戲卡片區域 --- */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px 15px;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: transform 0.15s ease-out;
            cursor: pointer;
        }

        .game-card:active { transform: scale(0.95); border-color: rgba(252, 205, 77, 0.5); }

        .game-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #222;
            background-size: cover;
            background-position: center;
        }

        .game-info { padding: 12px 10px; text-align: center; }
        .game-title { color: var(--gold); font-weight: bold; font-size: 15px; margin-bottom: 4px; display: block; }
        .game-desc { color: var(--text-gray); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay"></div>
    
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>星雲娛樂城</h2>
            <p>頂級博弈 尊爵體驗</p>
        </div>
        <ul class="sidebar-menu">
            <li onclick="closeMenu()"><span>🏠 全部遊戲</span> <span class="arrow">▶</span></li>
            <li onclick="closeMenu()"><span>🃏 棋牌中心</span> <span class="arrow">▶</span></li>
            <li onclick="closeMenu()"><span>🎰 老虎機</span> <span class="arrow">▶</span></li>
            <li onclick="closeMenu()"><span>🐟 捕魚機</span> <span class="arrow">▶</span></li>
            <li onclick="closeMenu()"><span>🔥 限定</span> <span class="arrow">▶</span></li>
            <li onclick="closeMenu()"><span>🎥 LIVE 真人</span> <span class="arrow">▶</span></li>
        </ul>
    </nav>

    <header class="navbar">
        <div class="menu-btn" id="openMenu">☰</div>
        <div class="logo">星雲遊戲館</div>
        <button class="login-btn">登入</button>
    </header>

    <main class="game-grid">
        <div class="game-card">
            <div class="game-img" style="background-image: url('https://via.placeholder.com/300x300/1a1a1a/fccd4d?text=21Point');"></div>
            <div class="game-info">
                <span class="game-title">尊爵 21 點</span>
                <span class="game-desc">高額獎池，挑戰莊家極限</span>
            </div>
        </div>
        <div class="game-card">
            <div class="game-img" style="background-image: url('https://via.placeholder.com/300x300/1a1a1a/fccd4d?text=Poker');"></div>
            <div class="game-info">
                <span class="game-title">德州撲克</span>
                <span class="game-desc">全球玩家對戰，贏取籌碼</span>
            </div>
        </div>
        <div class="game-card">
            <div class="game-img" style="background-image: url('https://via.placeholder.com/300x300/1a1a1a/fccd4d?text=Dice');"></div>
            <div class="game-info">
                <span class="game-title">急速推筒子</span>
                <span class="game-desc">傳統藝術與財富的交響樂</span>
            </div>
        </div>
        <div class="game-card">
            <div class="game-img" style="background-image: url('https://via.placeholder.com/300x300/1a1a1a/fccd4d?text=Baccarat');"></div>
            <div class="game-info">
                <span class="game-title">皇城百家樂</span>
                <span class="game-desc">經典奢華，開創財富傳奇</span>
            </div>
        </div>
    </main>

    <script>
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const openBtn = document.getElementById('openMenu');

        openBtn.addEventListener('click', () => {
            sidebar.classList.add('open');
            overlay.classList.add('active');
        });

        function closeMenu() {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        }

        overlay.addEventListener('click', closeMenu);
    </script>
</body>
</html>
