<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>星雲娛樂城 - iOS VIP</title>
    <style>
        :root {
            --gold-gradient: linear-gradient(135deg, #fceabb 0%, #fccd4d 50%, #f8b500 100%);
            --ios-bg: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.08);
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body {
            margin: 0;
            background-color: var(--ios-bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: white;
            padding-top: var(--safe-top);
        }

        /* 頂部標題 */
        .ios-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ios-header h1 {
            font-size: 24px;
            margin: 0;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .balance-pill {
            background: var(--glass);
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            font-size: 14px;
        }

        /* 卡片容器 */
        .game-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 15px;
            padding-bottom: calc(80px + var(--safe-bottom));
        }

        /* iOS 卡片樣式 */
        .game-card {
            aspect-ratio: 1 / 1;
            background: var(--glass);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .game-card:active {
            transform: scale(0.92);
            background: rgba(255, 255, 255, 0.15);
        }

        .game-card .icon-box {
            width: 60px;
            height: 60px;
            background: var(--gold-gradient);
            border-radius: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            box-shadow: 0 5px 15px rgba(248, 181, 0, 0.3);
        }

        .game-card span {
            font-size: 15px;
            font-weight: 500;
            color: #efefef;
        }

        /* iOS 底部導航 */
        .ios-tab-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: calc(60px + var(--safe-bottom));
            background: rgba(20, 20, 20, 0.94);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding-top: 10px;
            border-top: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        .tab-item {
            text-align: center;
            font-size: 10px;
            color: #888;
        }

        .tab-item.active { color: #fccd4d; }

        .tab-icon { font-size: 20px; display: block; margin-bottom: 2px; }
    </style>
</head>
<body>

    <div class="ios-header">
        <h1>星雲娛樂城</h1>
        <div class="balance-pill">💰 128,450</div>
    </div>

    <div class="game-container">
        <div class="game-card">
            <div class="icon-box">♠️</div>
            <span>21點</span>
        </div>
        <div class="game-card">
            <div class="icon-box">🏎️</div>
            <span>北京賽車</span>
        </div>
        <div class="game-card">
            <div class="icon-box">🃏</div>
            <span>德州撲克</span>
        </div>
        <div class="game-card">
            <div class="icon-box">🎲</div>
            <span>推筒子</span>
        </div>
        <div class="game-card">
            <div class="icon-box">💰</div>
            <span>百家樂</span>
        </div>
        <div class="game-card">
            <div class="icon-box">🐉</div>
            <span>射龍門</span>
        </div>
    </div>

    <nav class="ios-tab-bar">
        <div class="tab-item active"><span class="tab-icon">🏠</span>大廳</div>
        <div class="tab-item"><span class="tab-icon">🎁</span>活動</div>
        <div class="tab-item"><span class="tab-icon">💳</span>錢包</div>
        <div class="tab-item"><span class="tab-icon">👤</span>我的</div>
    </nav>

</body>
</html>
